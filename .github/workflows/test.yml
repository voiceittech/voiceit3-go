name: API Test
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Run API test
        env:
          VOICEIT_API_KEY: ${{ secrets.VOICEIT_API_KEY }}
          VOICEIT_API_TOKEN: ${{ secrets.VOICEIT_API_TOKEN }}
        run: go run test_example.go
